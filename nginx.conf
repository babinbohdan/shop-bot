# /etc/nginx/sites-available/shopbot
# Nginx конфіг для продакшен-деплою на VPS.
#
# Що робить:
#   - HTTPS через Let's Encrypt (certbot)
#   - /api/* → FastAPI (порт 8000)
#   - /* → React Mini App (статичні файли)
#
# Налаштування:
#   1. Замініть yourdomain.com на ваш домен
#   2. sudo certbot --nginx -d yourdomain.com
#   3. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # SSL — certbot заповнить автоматично
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Статика Mini App (React build)
    root /home/ubuntu/shop_bot/mini_app/dist;
    index index.html;

    # Всі API запити → FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60;
    }

    # React SPA — всі інші маршрути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кешування статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
